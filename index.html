<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archaeology Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #020617; color: #f8fafc; }
    .card { background-color: #0f172a; border: 1px solid #1e293b; }
    .completed { background-color: rgba(234, 179, 8, 0.1); border-color: rgba(234, 179, 8, 0.5); }
    .locked { opacity: 0.5; filter: grayscale(0.5); }
  </style>
</head>
<body class="min-h-screen bg-slate-950">
  
  <header class="sticky top-0 z-50 border-b border-yellow-500/20 bg-slate-950/90 backdrop-blur-md px-4 py-4">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-yellow-400 to-amber-500 bg-clip-text text-transparent">RS3 Archaeology Guide</h1>
      </div>
      <div class="flex items-center gap-4 bg-slate-900 rounded-lg p-3 border border-yellow-500/20">
        <div class="text-center">
          <div class="text-xs text-slate-400">Nível de Arqueologia</div>
          <div class="text-2xl font-bold text-yellow-400" id="current-level-display">99</div>
        </div>
        <input type="range" id="level-input" min="1" max="120" value="99" class="w-32 md:w-48 accent-yellow-500">
      </div>
    </div>
    
    <nav class="max-w-7xl mx-auto mt-4 flex gap-2 overflow-x-auto">
      <button data-tab="overview" class="tab-btn px-4 py-2 bg-yellow-500 text-black font-bold rounded-md"><i class="fa-solid fa-chart-pie mr-2"></i>Visão Geral</button>
      <button data-tab="mysteries" class="tab-btn px-4 py-2 bg-slate-800 text-slate-300 hover:bg-slate-700 rounded-md"><i class="fa-solid fa-scroll mr-2"></i>Mistérios</button>
      <button data-tab="artefacts" class="tab-btn px-4 py-2 bg-slate-800 text-slate-300 hover:bg-slate-700 rounded-md"><i class="fa-solid fa-gem mr-2"></i>Artefatos</button>
      <button data-tab="collections" class="tab-btn px-4 py-2 bg-slate-800 text-slate-300 hover:bg-slate-700 rounded-md"><i class="fa-solid fa-box-open mr-2"></i>Coleções</button>
      <button data-tab="research" class="tab-btn px-4 py-2 bg-slate-800 text-slate-300 hover:bg-slate-700 rounded-md"><i class="fa-solid fa-magnifying-glass mr-2"></i>Pesquisas</button>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6" id="tab-content">
    </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
